<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" type="text/css" href="/css/override.css" />

  {% feed_meta %} {% if jekyll.environment == 'production' and
  site.google_analytics %}
  <!-- Begin Google Analytics -->
  {% include google-analytics.html %}
  <!-- End Google Analytics -->
  {% endif %}

  <!-- Begin highlight.js support -->
  <!-- Include a theme for syntax highlighting -->
  <link rel="stylesheet" href="/js/highlightjs/styles/github.css" />
  <!-- Optionally include a second theme like ssms.css or others -->
  <link rel="stylesheet" href="/js/highlightjs/styles/ssms.css" />

  <!-- Include highlight.js library -->
  <script
    type="text/javascript"
    src="/js/highlightjs/highlight.min.js"
  ></script>

  <!-- Include languages, you can add more as needed -->
  <script
    type="text/javascript"
    src="/js/highlightjs/languages/auto.min.js"
  ></script>
  <!-- Automatically loads all languages -->
  <!-- Or, you can manually load more languages -->
  <script
    type="text/javascript"
    src="/js/highlightjs/languages/python.min.js"
  ></script>
  <script
    type="text/javascript"
    src="/js/highlightjs/languages/javascript.min.js"
  ></script>
  <script
    type="text/javascript"
    src="/js/highlightjs/languages/java.min.js"
  ></script>
  <script
    type="text/javascript"
    src="/js/highlightjs/languages/cpp.min.js"
  ></script>
  <!-- Add more language definitions as needed -->

  <!-- Initialize syntax highlighting -->
  <script type="text/javascript">
    hljs.highlightAll();
  </script>
  <!-- End highlight.js support -->
</head>
