<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}"> <link
  rel="stylesheet" type="text/css" href="{{ "/css/override.css" | relative_url
  }}" /> {% feed_meta %} {% if jekyll.environment == 'production' and
  site.google_analytics %}
  <!-- Begin Google Analytics -->
  {% include google-analytics.html %}
  <!-- End Google Analytics -->
  {% endif %}

  <!-- Begin MathJax support -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [
          ["$", "$"],
          ["\\(", "\\)"],
        ],
        displayMath: [
          ["$$", "$$"],
          ["\\[", "\\]"],
        ],
        processEscapes: true,
        processEnvironments: true,
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre"],
      },
    };
  </script>
  <script
    type="text/javascript"
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
  ></script>
  <!-- End MathJax support -->

  <!-- Begin highlight.js support -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Optional: Load additional languages -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>

  <!-- Initialize highlight.js -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      hljs.highlightAll();
    });
  </script>
  <!-- End highlight.js support -->

  {% if jekyll.environment == 'production' -%}
  <!-- dark theme using DarkReader with custom settings -->
  <script src="//unpkg.com/darkreader@4.9.96/darkreader.js"></script>
  <script type="text/javascript">
    DarkReader.setFetchMethod(window.fetch); // Fix to remedy CORS errors in chrome console
    DarkReader.enable({
      brightness: 100,
      contrast: 90,
      sepia: 0,
      darkSchemeBackgroundColor: "#21262d", // Darker blue background
      darkSchemeTextColor: "#ecf2f8", // Light grayish blue text
      lightSchemeBackgroundColor: "#ffffff",
      lightSchemeTextColor: "#000000",
    });
  </script>
  {%- endif %}
</head>
