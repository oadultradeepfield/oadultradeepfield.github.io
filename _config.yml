kramdown:
  syntax_highlighter_opts:
    disable: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme

remote_theme: jekyll/minima
minima:
  skin: dark

titles_from_headings:
  strip_title: true
  collections: true

defaults:
